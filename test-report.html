<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار ميزة التقرير الشامل</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-8">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl font-bold text-gray-800 mb-6">اختبار ميزة التقرير الشامل بالذكاء الاصطناعي</h1>
        
        <div class="bg-white shadow rounded-lg p-6 mb-6">
            <h2 class="text-xl font-semibold mb-4">معلومات المشروع</h2>
            <div class="space-y-3">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">اسم المشروع</label>
                    <input type="text" id="projectName" value="مشروع سكني فاخر" 
                           class="w-full px-3 py-2 border rounded-md">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">التكلفة الإجمالية (ريال)</label>
                    <input type="number" id="totalCost" value="150000000" 
                           class="w-full px-3 py-2 border rounded-md">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">الإيرادات المتوقعة (ريال)</label>
                    <input type="number" id="totalRevenue" value="220000000" 
                           class="w-full px-3 py-2 border rounded-md">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">صافي الربح (ريال)</label>
                    <input type="number" id="netProfit" value="70000000" 
                           class="w-full px-3 py-2 border rounded-md">
                </div>
            </div>
        </div>

        <button onclick="generateReport()" 
                class="w-full bg-blue-600 text-white py-3 px-6 rounded-lg font-semibold hover:bg-blue-700 transition">
            إنشاء التقرير الشامل بالذكاء الاصطناعي
        </button>

        <div id="loading" class="hidden mt-6 text-center">
            <div class="inline-block animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div>
            <p class="mt-3 text-gray-600">جاري إنشاء التقرير... قد يستغرق هذا بضع ثوانٍ</p>
        </div>

        <div id="result" class="mt-6 bg-white shadow rounded-lg p-6 hidden">
            <h2 class="text-xl font-semibold mb-4">نتيجة الاختبار</h2>
            <div id="resultContent" class="prose max-w-none"></div>
        </div>
    </div>

    <script>
        async function generateReport() {
            const loading = document.getElementById('loading');
            const result = document.getElementById('result');
            const resultContent = document.getElementById('resultContent');

            loading.classList.remove('hidden');
            result.classList.add('hidden');

            try {
                const projectData = {
                    projectName: document.getElementById('projectName').value,
                    totalCost: parseFloat(document.getElementById('totalCost').value),
                    totalRevenue: parseFloat(document.getElementById('totalRevenue').value),
                    netProfit: parseFloat(document.getElementById('netProfit').value)
                };

                console.log('Sending request:', projectData);

                const response = await fetch('https://c88cdeb4.aqeeli-feasibility.pages.dev/api/generate-report', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(projectData)
                });

                const data = await response.json();
                console.log('Response:', data);

                loading.classList.add('hidden');
                result.classList.remove('hidden');

                if (data.success) {
                    resultContent.innerHTML = `
                        <div class="bg-green-50 border border-green-200 rounded-lg p-4 mb-4">
                            <h3 class="text-lg font-semibold text-green-800">✅ نجح إنشاء التقرير!</h3>
                            <p class="text-sm text-green-600 mt-1">
                                تم إنشاء التقرير بنجاح باستخدام نموذج ${data.metadata.model}
                            </p>
                            <p class="text-xs text-green-500 mt-1">
                                عدد الرموز المستخدمة: ${data.metadata.tokensUsed} | 
                                وقت الإنشاء: ${new Date(data.metadata.generatedAt).toLocaleString('ar-EG')}
                            </p>
                        </div>
                        <div class="bg-gray-50 border rounded-lg p-4 max-h-96 overflow-y-auto">
                            <pre class="whitespace-pre-wrap text-sm text-gray-800">${data.report}</pre>
                        </div>
                    `;
                } else {
                    resultContent.innerHTML = `
                        <div class="bg-red-50 border border-red-200 rounded-lg p-4">
                            <h3 class="text-lg font-semibold text-red-800">❌ فشل إنشاء التقرير</h3>
                            <p class="text-sm text-red-600 mt-2">${data.error}</p>
                        </div>
                    `;
                }
            } catch (error) {
                loading.classList.add('hidden');
                result.classList.remove('hidden');
                resultContent.innerHTML = `
                    <div class="bg-red-50 border border-red-200 rounded-lg p-4">
                        <h3 class="text-lg font-semibold text-red-800">❌ خطأ في الاتصال</h3>
                        <p class="text-sm text-red-600 mt-2">${error.message}</p>
                    </div>
                `;
                console.error('Error:', error);
            }
        }
    </script>
</body>
</html>
